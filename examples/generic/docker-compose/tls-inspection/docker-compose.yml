services:
  mcd-agent:
    image: montecarlodata/agent:${AGENT_IMAGE_TAG:-latest-generic}
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - BACKEND_SERVICE_URL=${BACKEND_SERVICE_URL}
      - MCD_AGENT_WRAPPER_TYPE=DOCKER
      - MCD_STORAGE_BUCKET_NAME=mcd-agent-storage
      - MCD_STORAGE=S3_COMPATIBLE
      - MCD_STORAGE_ENDPOINT_URL=http://minio:9000
      - MCD_STORAGE_ACCESS_KEY=${MINIO_ROOT_USER}
      - MCD_STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MCD_TOKEN_FILE_PATH=/etc/secrets/mcd-agent-token/contents.json
      - MCD_OPS_RUNNER_THREAD_COUNT=18
      - MCD_PUBLISHER_THREAD_COUNT=3
      - HTTPS_PROXY=http://mitmproxy:3128
      - HTTP_PROXY=http://mitmproxy:3128
      - NO_PROXY=minio,localhost,127.0.0.1
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    volumes:
      - ./certs/mitmproxy-ca-cert.pem:/usr/local/share/ca-certificates/mitmproxy-ca.crt:ro
      - ./secrets/token.json:/etc/secrets/mcd-agent-token/contents.json:ro
      - ./secrets/integrations:/etc/secrets/integrations:ro
    command: >-
      /bin/sh -c "
      update-ca-certificates 2>/dev/null;
      . .venv/bin/activate &&
      exec gunicorn --bind :$$PORT --workers $$GUNICORN_WORKERS --threads $$GUNICORN_THREADS --timeout $$GUNICORN_TIMEOUT hermes.agent.main:app
      "
    restart: unless-stopped
    depends_on:
      mitmproxy:
        condition: service_started
      create-bucket:
        condition: service_completed_successfully

  mitmproxy:
    image: mitmproxy/mitmproxy
    command: mitmweb --web-host 0.0.0.0 --listen-port 3128 --no-web-open-browser --set web_password=${MITMPROXY_WEB_PASSWORD} -s /home/mitmproxy/stream_sse.py
    ports:
      - "3128:3128"
      - "8081:8081"
    volumes:
      - ./certs:/home/mitmproxy/.mitmproxy
      - ./stream_sse.py:/home/mitmproxy/stream_sse.py:ro
    restart: unless-stopped

  create-bucket:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MC_HOST_local=http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
    entrypoint: ["mc", "mb", "local/mcd-agent-storage", "--ignore-existing"]

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  minio-data:
