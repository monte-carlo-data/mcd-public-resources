Parameters:
  TelemetryDataBucketArn:
    Type: String
    Description: ARN of the S3 bucket containing telemetry data
    AllowedPattern: '^arn:aws:s3:::.*$'
    ConstraintDescription: Must be a valid S3 bucket ARN

  SNSTopicArn:
    Type: String
    Description: ARN of an existing SNS topic to use for notifications. If left empty, a new SNS topic will be created.
    Default: ""
    AllowedPattern: '^(|arn:aws:sns:[^:]+:[0-9]{12}:[^:]+)$'
    ConstraintDescription: Must be either empty or a valid SNS topic ARN

  LambdaUDFImageUri:
    Type: String
    Description: URI of the Lambda UDF container image
    Default: "752656882040.dkr.ecr.us-east-1.amazonaws.com/mcd-otel-aws-athena-lambda-udf:latest"

  LambdaUDFTimeout:
    Type: Number
    Description: Timeout in seconds for the Lambda UDF function
    Default: 300
    MinValue: 1
    MaxValue: 900

  LambdaUDFMemorySize:
    Type: Number
    Description: Memory size in MB for the Lambda UDF function
    Default: 512
    MinValue: 128
    MaxValue: 10240

  EnablePartitionProjection:
    Type: String
    Description: >
      Declare the traces Glue table with Athena partition projection enabled (recommended).
      Athena then computes partition locations from the projection ranges instead of
      enumerating the Glue catalog, keeping multi-day queries fast as minute-grained
      partitions accumulate. Requires TelemetryServiceNames.
    Default: "false"
    AllowedValues: ["true", "false"]

  TelemetryServiceNames:
    Type: String
    Description: >
      Comma-separated OpenTelemetry service.name values your agents emit (the collector
      writes each service's traces under its own S3 path segment). Required when
      EnablePartitionProjection is true.
    Default: ""

  ProjectionYearRange:
    Type: String
    Description: >
      Inclusive year range for Athena partition projection, as "min,max". Keep the range
      tight - every extra year adds ~526k virtual partitions to the unpruned enumeration space.
    Default: "2025,2032"
    AllowedPattern: '^[0-9]{4},[0-9]{4}$'
    ConstraintDescription: Must be two 4-digit years separated by a comma, e.g. "2025,2032"

Rules:
  ServiceNamesRequiredForProjection:
    RuleCondition: !Equals [!Ref EnablePartitionProjection, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref TelemetryServiceNames, ""]]
        AssertDescription: TelemetryServiceNames must be provided when EnablePartitionProjection is true

Conditions:
  UseExistingSNS: !Not [!Equals [!Ref SNSTopicArn, ""]]
  CreateSNS: !Equals [!Ref SNSTopicArn, ""]
  EnableProjection: !Equals [!Ref EnablePartitionProjection, "true"]

Resources:
  # Glue Classifier
  GrokClassifier:
    Type: AWS::Glue::Classifier
    Properties:
      GrokClassifier:
        Classification: grok
        GrokPattern: "%{GREEDYDATA:value}"

  # SNS Topic (only if not provided)
  TelemetryNotificationsTopic:
    Type: AWS::SNS::Topic
    Condition: CreateSNS
    Properties:
      TopicName: !Sub "${AWS::StackName}-telemetry-notifications"
      Tags:
        - Key: Service
          Value: "mcd-otel-collector"
        - Key: Provider
          Value: "monte-carlo"

  # SNS Topic Policy to allow S3 to publish (only if SNS topic was created)
  TelemetryNotificationsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: CreateSNS
    Properties:
      Topics:
        - !Ref TelemetryNotificationsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref TelemetryNotificationsTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Ref TelemetryDataBucketArn

  # SQS Queue
  CrawlerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-glue-crawler-queue"
      MessageRetentionPeriod: 1209600  # 14 days
      ReceiveMessageWaitTimeSeconds: 20  # Long polling
      Tags:
        - Key: Service
          Value: "mcd-otel-collector"
        - Key: Provider
          Value: "monte-carlo"

  # SQS Queue Policy for SNS subscription
  CrawlerQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref CrawlerQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt CrawlerQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !If
                  - UseExistingSNS
                  - !Ref SNSTopicArn
                  - !Ref TelemetryNotificationsTopic
          - Effect: Allow
            Principal:
              AWS: !GetAtt GlueCrawlerRole.Arn
            Action:
              - sqs:DeleteMessage
              - sqs:GetQueueUrl
              - sqs:ReceiveMessage
              - sqs:GetQueueAttributes
              - sqs:SetQueueAttributes
              - sqs:PurgeQueue
            Resource: !GetAtt CrawlerQueue.Arn

  # SNS Topic Subscription
  SQSTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !If
        - UseExistingSNS
        - !Ref SNSTopicArn
        - !Ref TelemetryNotificationsTopic
      Protocol: sqs
      Endpoint: !GetAtt CrawlerQueue.Arn

  # IAM Role for Glue Crawler
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-glue-crawler-role"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-glue-crawler-s3-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Ref TelemetryDataBucketArn
                  - !Sub "${TelemetryDataBucketArn}/*"
        - PolicyName: !Sub "${AWS::StackName}-glue-crawler-sqs-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: VisualEditor0
                Effect: Allow
                Action:
                  - sqs:DeleteMessage
                  - sqs:GetQueueUrl
                  - sqs:ReceiveMessage
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:PurgeQueue
                Resource: !GetAtt CrawlerQueue.Arn
      Tags:
        - Key: Service
          Value: "mcd-otel-collector"
        - Key: Provider
          Value: "monte-carlo"

  # Glue Database
  TelemetryDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${AWS::StackName}-telemetry-db"
        Description: "Database for OpenTelemetry telemetry data"

  # Glue Table for traces (declared only when partition projection is enabled).
  #
  # Without this resource the crawler creates and owns the table, and Athena enumerates
  # every crawler-registered partition (one per minute of telemetry) when planning a
  # query - enumeration cost grows unboundedly with data age. Declaring the table lets
  # us attach Athena partition-projection parameters so partition locations are computed
  # from the ranges below instead. The crawler still runs against the same table: its
  # Tables.AddOrUpdateBehavior=MergeNewColumns update path only adds columns and never
  # removes table parameters, so projection settings and the crawler coexist.
  TracesTable:
    Type: AWS::Glue::Table
    Condition: EnableProjection
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref TelemetryDatabase
      TableInput:
        Name: traces
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: traces
          projection.enabled: "true"
          # The collector writes traces under a bare <service.name> path segment; the
          # crawler surfaces it as the leading string partition column partition_0.
          projection.partition_0.type: enum
          projection.partition_0.values: !Ref TelemetryServiceNames
          projection.year.type: integer
          projection.year.range: !Ref ProjectionYearRange
          projection.month.type: integer
          projection.month.range: "1,12"
          projection.month.digits: "2"
          projection.day.type: integer
          projection.day.range: "1,31"
          projection.day.digits: "2"
          projection.hour.type: integer
          projection.hour.range: "0,23"
          projection.hour.digits: "2"
          projection.minute.type: integer
          projection.minute.range: "0,59"
          projection.minute.digits: "2"
          # ${!...} renders literal ${...} - Athena substitutes these, not CloudFormation.
          storage.location.template: !Sub
            - "s3://${BucketName}/mcd/otel-collector/traces/${!partition_0}/year=${!year}/month=${!month}/day=${!day}/hour=${!hour}/minute=${!minute}"
            - BucketName: !Select [5, !Split [":", !Ref TelemetryDataBucketArn]]
        StorageDescriptor:
          Location: !Sub
            - "s3://${BucketName}/mcd/otel-collector/traces/"
            - BucketName: !Select [5, !Split [":", !Ref TelemetryDataBucketArn]]
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: com.amazonaws.glue.serde.GrokSerDe
            Parameters:
              input.format: "%{GREEDYDATA:value}"
          Columns:
            - Name: value
              Type: string
        PartitionKeys:
          - Name: partition_0  # service.name path segment
            Type: string
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
          - Name: hour
            Type: string
          - Name: minute
            Type: string

  # Glue Crawler
  TelemetryCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${AWS::StackName}-telemetry-crawler"
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref TelemetryDatabase
      Classifiers:
        - !Ref GrokClassifier
      Targets:
        S3Targets:
          - Path: !Sub 
              - "s3://${BucketName}/mcd/otel-collector/traces/"
              - BucketName: !Select [5, !Split [":", !Ref TelemetryDataBucketArn]]
            EventQueueArn: !GetAtt CrawlerQueue.Arn
      SchemaChangePolicy:
        DeleteBehavior: LOG
        UpdateBehavior: UPDATE_IN_DATABASE
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_EVENT_MODE
      Schedule:
        ScheduleExpression: "cron(*/30 * * * ? *)"
      Configuration: |
        {
          "Version": 1.0,
          "CrawlerOutput": {
            "Partitions": {
              "AddOrUpdateBehavior": "InheritFromTable"
            },
            "Tables": {
              "AddOrUpdateBehavior": "MergeNewColumns",
              "TableThreshold": 1
            }
          },
          "Grouping": {
            "TableGroupingPolicy": "CombineCompatibleSchemas"
          }
        }
      Tags:
        Service: "mcd-otel-collector"
        Provider: "monte-carlo"

  # IAM Role for Lambda UDF
  LambdaUDFRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-udf-role"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-lambda-udf-bedrock-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowInvokeBedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-*"
                  - "arn:aws:bedrock:*:*:inference-profile/*anthropic.claude-*"
      Tags:
        - Key: Service
          Value: "mcd-otel-collector"
        - Key: Provider
          Value: "monte-carlo"

  # Lambda Function for Athena UDF
  AthenaUDF:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: mcd-agent-observability-bedrock-udf
      Role: !GetAtt LambdaUDFRole.Arn
      PackageType: Image
      Code:
        ImageUri: !Ref LambdaUDFImageUri
      Timeout: !Ref LambdaUDFTimeout
      MemorySize: !Ref LambdaUDFMemorySize
      ImageConfig:
        Command:
          - handler.lambda_handler
      Tags:
        - Key: Service
          Value: "mcd-otel-collector"
        - Key: Provider
          Value: "monte-carlo"

Outputs:
  GlueDatabaseName:
    Description: Name of the Glue database
    Value: !Ref TelemetryDatabase
    Export:
      Name: !Sub "${AWS::StackName}-GlueDatabaseName"

  GlueCrawlerName:
    Description: Name of the Glue crawler
    Value: !Ref TelemetryCrawler
    Export:
      Name: !Sub "${AWS::StackName}-GlueCrawlerName"

  SNSTopicArn:
    Description: ARN of the SNS topic used for notifications
    Value: !If
      - UseExistingSNS
      - !Ref SNSTopicArn
      - !Ref TelemetryNotificationsTopic
    Export:
      Name: !Sub "${AWS::StackName}-SNSTopicArn"

  SQSQueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt CrawlerQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SQSQueueArn"

  LambdaUDFFunctionName:
    Description: Name of the Lambda UDF function
    Value: !Ref AthenaUDF
    Export:
      Name: !Sub "${AWS::StackName}-LambdaUDFFunctionName"

  LambdaUDFFunctionArn:
    Description: ARN of the Lambda UDF function
    Value: !GetAtt AthenaUDF.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaUDFFunctionArn"
