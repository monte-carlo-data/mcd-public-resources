namespace: mcd-agent
replicaCount: 1

image:
  pullPolicy: Always
  tag: "latest-generic"

container:
  backendServiceUrl: "<YOUR_BACKEND_SERVICE_URL>"
  storageBucketName: "mcd-agent-storage"
  storageType: "S3_COMPATIBLE"
  storageEndpointUrl: "http://minio-api.minio.svc.cluster.local:9000"
  storageAccessKey: "minioadmin"
  storageSecretKey: "minioadmin"
  extraEnv:
    - name: HTTPS_PROXY
      value: "http://mitmproxy.mcd-agent.svc.cluster.local:3128"
    - name: HTTP_PROXY
      value: "http://mitmproxy.mcd-agent.svc.cluster.local:3128"
    - name: NO_PROXY
      value: "minio-api.minio.svc.cluster.local,localhost,127.0.0.1"

# The firewallCa feature automatically builds a combined CA bundle and sets
# REQUESTS_CA_BUNDLE on the agent. Paste the contents of certs/ca-cert.pem here.
firewallCa:
  cert: |
    <PASTE_CA_CERT_PEM_HERE>

skipExternalSecrets: true

# k3s containerd uses Docker log format — symlinks under
# /var/log/pods/ resolve to /var/lib/docker/containers/.
logsCollector:
  containerRuntimeLogPath: "/var/lib/docker/containers"

# The agent image is amd64-only. On Apple Silicon Macs, enable Rosetta emulation
# in Rancher Desktop (Preferences > Virtual Machine > Emulation > VZ + Rosetta).
# Comment out or adjust nodeSelector if running on an Intel Mac.
nodeSelector:
  kubernetes.io/os: linux
  kubernetes.io/arch: arm64
