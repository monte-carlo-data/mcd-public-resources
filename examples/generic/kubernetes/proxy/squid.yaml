apiVersion: v1
kind: ConfigMap
metadata:
  name: squid-config
  namespace: mcd-agent
data:
  squid.conf: |
    http_port 3128

    acl SSL_ports port 443
    acl Safe_ports port 80 443
    acl CONNECT method CONNECT

    http_access deny !Safe_ports
    http_access deny CONNECT !SSL_ports
    http_access allow all

    access_log /var/log/squid/access.log squid
    cache deny all
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squid
  namespace: mcd-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squid
  template:
    metadata:
      labels:
        app: squid
    spec:
      containers:
        - name: squid
          image: ubuntu/squid:latest
          ports:
            - containerPort: 3128
          volumeMounts:
            - name: squid-config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: squid-config
          configMap:
            name: squid-config
---
apiVersion: v1
kind: Service
metadata:
  name: squid
  namespace: mcd-agent
spec:
  selector:
    app: squid
  ports:
    - port: 3128
      targetPort: 3128
